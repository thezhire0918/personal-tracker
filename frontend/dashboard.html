<!-- frontend/index.html -->

<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Personal Tracker</title>
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#2563eb">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f3f4f6;
      color: #111827;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 16px;
    }

    .card {
      background: white;
      padding: 16px;
      margin-bottom: 16px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin-bottom: 20px;
    }

    input, select, button {
      width: 100%;
      padding: 10px;
      margin: 6px 0;
      box-sizing: border-box;
      border-radius: 8px;
      border: 1px solid #d1d5db;
      font-size: 15px;
    }

    button {
      background: #2563eb;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    button.secondary {
      background: #6b7280;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .summary-box {
      background: #f9fafb;
      padding: 12px;
      border-radius: 10px;
      text-align: center;
    }

    .income {
      color: #16a34a;
      font-weight: bold;
    }

    .expense {
      color: #dc2626;
      font-weight: bold;
    }

    .balance {
      color: #2563eb;
      font-weight: bold;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #e5e7eb;
      text-align: left;
    }

    th {
      background: #f3f4f6;
    }

    @media (max-width: 600px) {
      .summary {
        grid-template-columns: 1fr;
      }

      table {
        font-size: 12px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Personal Tracker</h1>

    <button class="secondary" onclick="logout()">Logout</button>

    <div class="card">
      <h2>Add Transaction</h2>
      <select id="type">
        <option value="income">Income</option>
        <option value="expense">Expense</option>
      </select>
      <input id="amount" placeholder="Amount" type="number">
      <input id="category" placeholder="Category">
      <input id="description" placeholder="Description">
      <button onclick="addTransaction()">Add Transaction</button>
    </div>

    <div class="card">
      <h2>Balance</h2>
      <button onclick="getBalance()">Refresh Balance</button>

      <div class="summary">
        <div class="summary-box">
          <p>Total Income</p>
          <h3 id="totalIncome" class="income">₱0</h3>
        </div>

        <div class="summary-box">
          <p>Total Expense</p>
          <h3 id="totalExpense" class="expense">₱0</h3>
        </div>

        <div class="summary-box">
          <p>Balance</p>
          <h3 id="balance" class="balance">₱0</h3>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>Transactions</h2>
      <button onclick="getTransactions()">Refresh Transactions</button>

      <table>
        <thead>
          <tr>
            <th>Type</th>
            <th>Amount</th>
            <th>Category</th>
            <th>Description</th>
            <th>Date</th>
          </tr>
        </thead>
        <tbody id="transactions"></tbody>
      </table>
    </div>
  </div>

  <script>
    let token = localStorage.getItem("token") || "";

    if (!token) {
      window.location.href = "./index.html";
    }

    function formatPeso(amount) {
      return "\u20B1" + Number(amount).toLocaleString();
    }

    function updateLoginStatus() {
      const status = document.getElementById("loginStatus");
      status.textContent = token ? "Logged in" : "Not logged in";
    }

    async function login() {
      const response = await fetch("http://127.0.0.1:8000/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
          email: document.getElementById("email").value,
          password: document.getElementById("password").value
        })
      });

      const data = await response.json();

      if (!response.ok) {
        alert("Login failed: " + JSON.stringify(data));
        return;
      }

      token = data.access_token;
      localStorage.setItem("token", token);

      updateLoginStatus();
      getBalance();
      getTransactions();
    }

    function logout() {
      localStorage.removeItem("token");
      window.location.href = "./index.html";
    }

    async function addTransaction() {
      if (!token) {
        alert("Please login first");
        return;
      }

      const response = await fetch("http://127.0.0.1:8000/transactions", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + token
        },
        body: JSON.stringify({
          type: document.getElementById("type").value,
          amount: Number(document.getElementById("amount").value),
          category: document.getElementById("category").value,
          description: document.getElementById("description").value
        })
      });

      const data = await response.json();

      if (!response.ok) {
        alert("Add failed: " + JSON.stringify(data));
        return;
      }

      document.getElementById("amount").value = "";
      document.getElementById("category").value = "";
      document.getElementById("description").value = "";

      getBalance();
      getTransactions();
    }

    async function getBalance() {
      if (!token) return;

      const response = await fetch("http://127.0.0.1:8000/balance", {
        headers: {"Authorization": "Bearer " + token}
      });

      const data = await response.json();

      if (!response.ok) {
        alert("Balance failed: " + JSON.stringify(data));
        return;
      }

      document.getElementById("totalIncome").textContent = formatPeso(data.total_income);
      document.getElementById("totalExpense").textContent = formatPeso(data.total_expense);
      document.getElementById("balance").textContent = formatPeso(data.balance);
    }

    async function getTransactions() {
      if (!token) return;

      const response = await fetch("http://127.0.0.1:8000/transactions", {
        headers: {"Authorization": "Bearer " + token}
      });

      const data = await response.json();

      if (!response.ok) {
        alert("Transactions failed: " + JSON.stringify(data));
        return;
      }

      const table = document.getElementById("transactions");
      table.innerHTML = "";

      data.forEach(item => {
        const row = document.createElement("tr");

        row.innerHTML = `
          <td class="${item.type}">${item.type}</td>
          <td>${formatPeso(item.amount)}</td>
          <td>${item.category || ""}</td>
          <td>${item.description || ""}</td>
          <td>${new Date(item.created_at).toLocaleString()}</td>
        `;

        table.appendChild(row);
      });
    }

    updateLoginStatus();

    if (token) {
      getBalance();
      getTransactions();
    }

    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("./service-worker.js")
        .then(() => console.log("Service worker registered"))
        .catch(error => console.log("Service worker failed:", error));
    }
  </script>
</body>
</html>
